<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Citizen Machinery Selector</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .machine-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }
    .machine-card {
      background: white;
      border: 2px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .machine-card:hover {
      border-color: #4a90e2;
      transform: translateY(-2px);
    }
    .machine-card.selected {
      border-color: #4a90e2;
      background-color: #f0f4ff;
    }
    .machine-card img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    .form-section {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
    }
    .form-row {
      display: flex;
      gap: 20px;
      margin: 10px 0;
    }
    .form-group {
      flex: 1;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .submit-btn {
      background: #4a90e2;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    .submit-btn:hover {
      background: #357abd;
    }
    .debug {
      background: #f0f0f0;
      padding: 10px;
      border-radius: 4px;
      margin: 10px 0;
      font-family: monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <h2>Select Your Machine & Configure Output</h2>
  
  <div class="debug" id="debugInfo">
    <strong>Debug Info:</strong><br>
    <span id="debugText">Loading...</span>
  </div>

  <div class="machine-grid" id="machineGrid">
    <!-- Machines will be loaded here -->
  </div>

  <div class="form-section">
    <h3>Output Units</h3>
    <div class="form-row">
      <label>
        <input type="radio" name="outputUnits" value="mm" checked> MM
      </label>
      <label>
        <input type="radio" name="outputUnits" value="in"> IN
      </label>
    </div>
  </div>

  <div class="form-section">
    <h3>Post Properties</h3>
    <div class="form-row">
      <label>
        <input type="checkbox" name="useSequenceNumbers"> Use sequence numbers
      </label>
      <label>
        <input type="checkbox" name="outputCodeAsSubPrograms"> Output Code as Sub Programs
      </label>
    </div>
    <div class="form-row">
      <label>
        <input type="checkbox" name="optionalStop"> Optional stop
      </label>
      <label>
        <input type="checkbox" name="radiusArcs"> Radius Arcs
      </label>
    </div>
    <div class="form-row">
      <label>
        <input type="checkbox" name="parametricFeed"> Parametric Feed
      </label>
      <label>
        <input type="checkbox" name="leaveSpindles"> Leave Spindles Running
      </label>
    </div>
    <div class="form-row">
      <label>
        <input type="checkbox" name="g50Gang"> G50 on Gang Driven
      </label>
      <label>
        <input type="checkbox" name="increaseBStroke"> Increase B-axis stroke
      </label>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="subPhaseAngle">Sub Spindle Phase Angle:</label>
        <input type="number" name="subPhaseAngle" id="subPhaseAngle" placeholder="e.g. 45.0">
      </div>
      <div class="form-group">
        <label for="startSeqNum">Start sequence number:</label>
        <input type="number" name="startSeqNum" id="startSeqNum" placeholder="e.g. 10">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="seqIncrement">Sequence number increment:</label>
        <input type="number" name="seqIncrement" id="seqIncrement" placeholder="e.g. 1">
      </div>
      <div class="form-group">
        <label for="maxSpindleSpeed">Max spindle speed:</label>
        <input type="number" name="maxSpindleSpeed" id="maxSpindleSpeed" placeholder="e.g. 5000">
      </div>
    </div>
  </div>

  <button class="submit-btn" onclick="submitForm()">Submit</button>

  <script>
    // Debug function
    function debugLog(message) {
      console.log(message);
      const debugText = document.getElementById('debugText');
      debugText.innerHTML += message + '<br>';
    }

    // Machine data
    const machines = [
      { label: "L12 VII", src: "Machines/L12.jpg", value: "L12-VII", series: "L10Series" },
      { label: "L220 VIII", src: "Machines/L220-VIII.jpg", value: "L220-VIII", series: "L20Series" },
      { label: "L32 VIII", src: "Machines/L32-XII.jpg", value: "L32-VIII", series: "L20Series" },
      { label: "L32 X", src: "Machines/L32-XII.jpg", value: "L32-X", series: "L20Series" },
      { label: "L32 XII", src: "Machines/L32-XII.jpg", value: "L32-XII", series: "L20Series" },
      { label: "L212 X", src: "Machines/L12X.jpg", value: "L212-X", series: "L20Series" },
      { label: "L320 VIII", src: "Machines/Generic.jpg", value: "L320-VIII", series: "L300Series" },
      { label: "L320 X", src: "Machines/Generic.jpg", value: "L320-X", series: "L300Series" },
      { label: "L320 XII", src: "Machines/Generic.jpg", value: "L320-XII", series: "L300Series" },
      { label: "L320 XII B5", src: "Machines/Generic.jpg", value: "L320-XIIB5", series: "L300Series" },
      { label: "M232 III", src: "Machines/M232-III.jpg", value: "M232III", series: "MSeries" },
      { label: "M316 III", src: "Machines/M232-III.jpg", value: "M316III", series: "MSeries" },
      { label: "BNA GTY", src: "Machines/BNA GTY.jpg", value: "BNAGTY", series: "Miyano" },
      { label: "BNE MYY", src: "Machines/BNE MYY.jpg", value: "BNEMYY", series: "Miyano" },
      { label: "ABX SYY", src: "Machines/ABX-SYY.jpg", value: "ABXSYY", series: "Miyano" }
    ];

    let selectedMachine = null;

    // Initialize the page
    function init() {
      debugLog('Page initialized');
      loadMachines();
    }

    // Load machines into the grid
    function loadMachines() {
      debugLog('Loading machines...');
      const machineGrid = document.getElementById('machineGrid');
      machineGrid.innerHTML = '';

      machines.forEach(machine => {
        const card = document.createElement('div');
        card.className = 'machine-card';
        card.dataset.value = machine.value;
        card.dataset.series = machine.series;
        
        card.innerHTML = `
          <img src="${machine.src}" alt="${machine.label}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
          <div style="display:none; width:100px; height:100px; background:#f0f0f0; border-radius:4px; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; font-size:12px;">No Image</div>
          <div>${machine.label}</div>
        `;
        
        card.onclick = () => selectMachine(card, machine);
        machineGrid.appendChild(card);
      });
      
      debugLog(`Loaded ${machines.length} machines`);
    }

    // Select a machine
    function selectMachine(card, machine) {
      debugLog(`Selecting machine: ${machine.label}`);
      
      // Clear previous selection
      document.querySelectorAll('.machine-card').forEach(c => c.classList.remove('selected'));
      
      // Select new machine
      card.classList.add('selected');
      selectedMachine = machine;
      
      debugLog(`Selected machine: ${machine.value}`);
    }

    // Submit form
    function submitForm() {
      if (!selectedMachine) {
        alert('Please select a machine first!');
        return;
      }

      debugLog('Submitting form...');
      
      // Collect form data
      const formData = {
        selectedImage: selectedMachine.value,
        formValues: {
          outputUnits: document.querySelector('input[name="outputUnits"]:checked').value,
          useSequenceNumbers: document.querySelector('input[name="useSequenceNumbers"]').checked,
          outputCodeAsSubPrograms: document.querySelector('input[name="outputCodeAsSubPrograms"]').checked,
          optionalStop: document.querySelector('input[name="optionalStop"]').checked,
          radiusArcs: document.querySelector('input[name="radiusArcs"]').checked,
          parametricFeed: document.querySelector('input[name="parametricFeed"]').checked,
          leaveSpindles: document.querySelector('input[name="leaveSpindles"]').checked,
          g50Gang: document.querySelector('input[name="g50Gang"]').checked,
          increaseBStroke: document.querySelector('input[name="increaseBStroke"]').checked,
          subPhaseAngle: document.querySelector('input[name="subPhaseAngle"]').value,
          startSeqNum: document.querySelector('input[name="startSeqNum"]').value,
          seqIncrement: document.querySelector('input[name="seqIncrement"]').value,
          maxSpindleSpeed: document.querySelector('input[name="maxSpindleSpeed"]').value
        }
      };

      debugLog('Form data: ' + JSON.stringify(formData, null, 2));

      // Send to Python
      try {
        if (window.adsk && window.adsk.fusionSendData) {
          window.adsk.fusionSendData('FORM_SUBMIT', JSON.stringify(formData));
          alert('Form submitted successfully!');
          debugLog('Form sent to Python successfully');
        } else {
          alert('Fusion 360 API not available');
          debugLog('Fusion 360 API not available');
        }
      } catch (error) {
        alert('Error submitting form: ' + error.message);
        debugLog('Error: ' + error.message);
      }
    }

    // Start when page loads
    document.addEventListener('DOMContentLoaded', init);
    
    // Also try window load as backup
    window.addEventListener('load', () => {
      debugLog('Window loaded');
      if (!selectedMachine) {
        init();
      }
    });

  </script>

</body>
</html>
